<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Quality Auditor</title>
    <meta name="description" content="Instant, deep quality audits for any GitHub web repository.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1><span class="gradient-text">Web Quality</span> Auditor</h1>
                <p>Paste a GitHub URL to run a comprehensive code, security, and SEO analysis.</p>
                <div class="input-group">
                    <input type="url" id="repoUrl" placeholder="https://github.com/user/repo" required>
                    <button id="analyzeBtn" class="btn-primary">
                        <span class="btn-text">Audit Now</span>
                    </button>
                </div>
                <div id="status"></div>
            </div>
        </header>

        <main id="reportContainer" class="hidden">
            <!-- Loading, Error, or Report will be injected here via JS -->
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
